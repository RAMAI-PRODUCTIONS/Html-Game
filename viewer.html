/* ── Top bar ── */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(4px);
  display:flex;flex-wrap:wrap;gap:5px;padding:6px 8px;
  align-items:center;border-bottom:1px solid #333;
}
#topbar select{
  flex:1;min-width:130px;padding:5px 8px;font-size:12px;
  background:#1a1a1a;color:#eee;border:1px solid #444;border-radius:4px;
}
#topbar button{
  padding:5px 11px;font-size:12px;border:none;border-radius:4px;
  cursor:pointer;font-family:inherit;font-weight:bold;
}
.btn-load {background:#27ae60;color:#fff;}
.btn-spawn{background:#2980b9;color:#fff;}
.btn-clear{background:#c0392b;color:#fff;}
.btn-tog  {background:#7f8c8d;color:#fff;}
.btn-ecs  {background:#8e44ad;color:#fff;}

/* ── Perf HUD ── */
#hud{
  position:fixed;top:52px;right:8px;z-index:100;
  background:rgba(0,0,0,0.82);border:1px solid #333;
  border-radius:6px;padding:8px 12px;min-width:190px;
  font-size:11px;color:#ccc;line-height:1.8;
}
#hud .val {color:#0ff;font-weight:bold;}
#hud .warn{color:#f90;}
#hud .bad {color:#f44;}
#hud .good{color:#4f4;}

/* ── ECS debug panel ── */
#ecspanel{
  position:fixed;top:52px;left:8px;z-index:100;
  background:rgba(0,0,0,0.82);border:1px solid #555;
  border-radius:6px;padding:8px 12px;min-width:160px;
  font-size:11px;color:#ccc;line-height:1.8;display:none;
}
#ecspanel .lbl{color:#fa0;font-weight:bold;}

/* ── Virtual joystick ── */
#joystick-zone{
  position:fixed;bottom:0;left:0;width:50%;height:40%;
  z-index:50;pointer-events:none;
}
#joy-base{
  position:absolute;bottom:50px;left:50px;
  width:100px;height:100px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.25);
  background:rgba(255,255,255,0.06);
  pointer-events:none;
}
#joy-knob{
  position:absolute;top:50%;left:50%;
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,0.35);
  transform:translate(-50%,-50%);
  pointer-events:none;
}

/* ── Status overlay ── */
#status{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.9);color:#fff;padding:18px 28px;
  border-radius:8px;font-size:15px;z-index:200;text-align:center;
  border:1px solid #555;display:none;
}

/* ── Quality badge ── */

  background:rgba(0,0,0,0.7);color:#ff0;font-size:11px;
  padding:3px 8px;border-radius:4px;
}

<!-- ═══════════════════════════════════════════════════════════════
     SECTION 1 — Stash native Image BEFORE any patches
     Three.js must receive the patched Image constructor
     ═══════════════════════════════════════════════════════════════ -->
<script>window._NativeImage = window.Image;</script>

<!-- ═══════════════════════════════════════════════════════════════
     SECTION 2 — Android WebView patches
     fetch() + Image.src both blocked on file:// — route via XHR
     ═══════════════════════════════════════════════════════════════ -->
<script>
(function(){
  // ── PATCH 1: fetch() ─────────────────────────────────────────
  var _fetch = window.fetch;
  window.fetch = function(input, init){
    var url = (input && input.url) ? input.url : String(input);
    var isFile = url.indexOf('file://') === 0 || url.indexOf('file:///android_asset') === 0;
    var isRel  = url.indexOf('http') !== 0 && url.indexOf('data:') !== 0 && url.indexOf('blob:') !== 0;
    if(isFile || isRel){
      return new Promise(function(res,rej){
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.responseType = 'arraybuffer';
        xhr.onload = function(){
          if(xhr.status===200||xhr.status===0){
            var ext = url.split('.').pop().toLowerCase();
            var ct = {glb:'model/gltf-binary',gltf:'model/gltf+json',bin:'application/octet-stream',
                      png:'image/png',jpg:'image/jpeg',jpeg:'image/jpeg'}[ext]||'application/octet-stream';
            res(new Response(xhr.response,{status:200,headers:{'Content-Type':ct,'Content-Length':xhr.response.byteLength}}));
          } else { rej(new TypeError('fetch failed: '+url)); }
        };
        xhr.onerror = function(){ rej(new TypeError('fetch error: '+url)); };
        xhr.send();
      });
    }
    return _fetch ? _fetch.call(window,input,init) : Promise.reject(new Error('no fetch'));
  };

  // ── PATCH 2: Image.src ───────────────────────────────────────
  var NativeImg = window._NativeImage;
  var srcDesc = Object.getOwnPropertyDescriptor(NativeImg.prototype,'src');
  if(srcDesc && srcDesc.set){
    var _setSrc = srcDesc.set, _getSrc = srcDesc.get;
    Object.defineProperty(NativeImg.prototype,'src',{
      configurable:true,
      get:function(){ return _getSrc.call(this); },
      set:function(url){
        if(!url){ _setSrc.call(this,url); return; }
        var isFile = url.indexOf('file://') === 0;
        var isRel  = url.indexOf('http') !== 0 && url.indexOf('data:') !== 0
                  && url.indexOf('blob:') !== 0 && url.length > 1;
        if(isFile || isRel){
          var self = this;
          var xhr = new XMLHttpRequest();
          xhr.open('GET',url,true); xhr.responseType='blob';
          xhr.onload = function(){
            if(xhr.status===200||xhr.status===0) _setSrc.call(self,URL.createObjectURL(xhr.response));
            else _setSrc.call(self,url);
          };
          xhr.onerror = function(){ _setSrc.call(self,url); };
          xhr.send();
        } else { _setSrc.call(this,url); }
      }
    });
  }
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════
     SECTION 3 — Three.js r128 + GLTFLoader (same version)
     ═══════════════════════════════════════════════════════════════ -->
<script src="assets/js/three.min.js"></script>
<script src="assets/js/GLTFLoader.js"></script>

<!-- ═══════════════════════════════════════════════════════════════
     SECTION 4 — ALL GAME CODE
     Order: A-Constants → B-ECS → C-Systems → D-Renderer
            → E-Assets → F-Init → G-Loop
     ═══════════════════════════════════════════════════════════════ -->
<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════
// A — CONSTANTS & CONFIG
// ═══════════════════════════════════════════════════════════════════

var MAX_E    = 2048;       // max live entities — power of 2
var FIXED_DT = 1 / 60;    // 16.667 ms physics step (NES = 60Hz NTSC)
var MAX_STEPS = 5;         // spiral-of-death guard

// Entity type tags — Uint8 (0-255)
var T_NONE     = 0;
var T_PLAYER   = 1;
var T_ENEMY    = 2;
var T_VEHICLE  = 3;
var T_BUILDING = 4;
var T_PICKUP   = 5;

// Bit-packed FLAGS — 8 booleans in 1 byte (NES sprite attribute byte)
var F_ALIVE   = 1;    // bit 0
var F_VISIBLE = 2;    // bit 1
var F_PHYSICS = 4;    // bit 2
var F_AI      = 8;    // bit 3
var F_PLAYER  = 16;   // bit 4
var F_ENEMY   = 32;   // bit 5
var F_STATIC  = 64;   // bit 6
var F_DIRTY   = 128;  // bit 7 — transform changed this frame

// AI states — Uint8
var AI_IDLE   = 0;
var AI_PATROL = 1;
var AI_CHASE  = 2;
var AI_ATTACK = 3;

// Quality tiers
var QUALITY_CONFIGS = [
  { pr:0.75, shadowMap:512,  fog:0.018 }, // LOW
  { pr:1.0,  shadowMap:1024, fog:0.010 }, // MED
  { pr:Math.min(window.devicePixelRatio,2), shadowMap:2048, fog:0.006 } // HIGH
];

// ═══════════════════════════════════════════════════════════════════
// B — ECS CORE  (flat typed arrays — NES OAM style)
//   Entity = integer ID.  No objects, no GC in hot path.
//   entity 5 → PX[5], PY[5], FLAGS[5] etc.
// ═══════════════════════════════════════════════════════════════════

// Position / velocity — Float32 (4 bytes each, SIMD-friendly)
var PX = new Float32Array(MAX_E);
var PY = new Float32Array(MAX_E);
var PZ = new Float32Array(MAX_E);
var VX = new Float32Array(MAX_E);
var VY = new Float32Array(MAX_E);
var VZ = new Float32Array(MAX_E);
var RY = new Float32Array(MAX_E);   // yaw rotation

// Health — Int16 (2 bytes, saves 50% vs Int32)
var HP     = new Int16Array(MAX_E);
var HP_MAX = new Int16Array(MAX_E);

// Flags — Uint8 bit-packed (8 booleans in 1 byte)
var FLAGS = new Uint8Array(MAX_E);

// Type tag — Uint8
var TYPE = new Uint8Array(MAX_E);

// Mesh pool references — Int16 (pool ID + instance slot)
var MESH_ID  = new Int16Array(MAX_E);
var MESH_IDX = new Int16Array(MAX_E);

// AI state — Uint8 + Float32 timer + Int16 target
var AI_STATE  = new Uint8Array(MAX_E);
var AI_TIMER  = new Float32Array(MAX_E);
var AI_TARGET = new Int16Array(MAX_E);

// Entity lifecycle counters
var _eid  = 0;       // next fresh ID
var _free = [];      // recycled IDs

// Query scratch buffer — reused every frame, never allocated in loop
var _qBuf = new Int32Array(MAX_E);
var _qLen = 0;

function createEntity() {
  var id = _free.length ? _free.pop() : _eid++;
  if(id >= MAX_E){ console.error('ECS: pool full'); return -1; }
  FLAGS[id]    = F_ALIVE | F_VISIBLE;
  PX[id] = PY[id] = PZ[id] = 0;
  VX[id] = VY[id] = VZ[id] = 0;
  RY[id] = 0;
  HP[id] = HP_MAX[id] = 100;
  MESH_ID[id] = MESH_IDX[id] = -1;
  TYPE[id] = T_NONE;
  AI_STATE[id] = AI_IDLE;
  AI_TIMER[id] = 0;
  AI_TARGET[id] = -1;
  return id;
}

function destroyEntity(id) {
  FLAGS[id] = 0;
  MESH_ID[id] = -1;
  _free.push(id);
}

// Query all alive entities with a given flag bit set
// Returns count; caller reads _qBuf[0.._qLen-1]
function queryFlag(flag) {
  _qLen = 0;
  var top = _eid;
  for(var i = 0; i < top; i++){
    if(FLAGS[i] & flag) _qBuf[_qLen++] = i;
  }
  return _qLen;
}

// ═══════════════════════════════════════════════════════════════════
// C — SYSTEMS  (pure functions over component arrays)
// ═══════════════════════════════════════════════════════════════════

// ── C1: Physics System ───────────────────────────────────────────
var GRAVITY = -20.0;

function physicsSystem(dt) {
  var top = _eid;
  for(var i = 0; i < top; i++){
    var f = FLAGS[i];
    if(!(f & F_ALIVE))   continue;
    if(!(f & F_PHYSICS)) continue;
    if(f & F_STATIC)     continue;

    VY[i] += GRAVITY * dt;
    PX[i] += VX[i] * dt;
    PY[i] += VY[i] * dt;
    PZ[i] += VZ[i] * dt;

    // Ground clamp
    if(PY[i] < 0){ PY[i] = 0; VY[i] = 0; }

    // Horizontal friction
    VX[i] *= 0.88;
    VZ[i] *= 0.88;

    // Only mark dirty if actually moved (dead-zone: < 0.0001 units)
    var moved = (VX[i]*VX[i] + VY[i]*VY[i] + VZ[i]*VZ[i]) > 0.00001;
    if(moved) FLAGS[i] |= F_DIRTY;
  }
}

// ── C2: Render Sync System ───────────────────────────────────────
// Only pushes dirty transforms to GPU — zero work for static entities
var _syncObj = null; // THREE.Object3D, created after Three.js loads

function renderSyncSystem() {
  if(!_syncObj) return;
  _syncObj.scale.set(1,1,1); // always unit scale — freeMeshSlot restores this
  var top = _eid;
  for(var i = 0; i < top; i++){
    var f = FLAGS[i];
    if(!(f & F_ALIVE))   continue;
    if(!(f & F_DIRTY))   continue;
    if(!(f & F_VISIBLE)) continue;
    var mid = MESH_ID[i];
    var idx = MESH_IDX[i];
    if(mid < 0 || idx < 0) continue;
    var p = meshPool[mid];
    if(!p) continue;
    _syncObj.position.set(PX[i], PY[i], PZ[i]);
    _syncObj.rotation.set(0, RY[i], 0);
    _syncObj.updateMatrix();
    p.mesh.setMatrixAt(idx, _syncObj.matrix);
    p.mesh.instanceMatrix.needsUpdate = true;
    FLAGS[i] &= ~F_DIRTY; // clear dirty bit
  }
}

// ── C3: AI System ────────────────────────────────────────────────
var CHASE_RANGE  = 20.0;
var ATTACK_RANGE =  2.5;
var CHASE_SPEED  =  5.0;

function aiSystem(dt) {
  var n = queryFlag(F_AI);
  for(var q = 0; q < n; q++){
    var i = _qBuf[q];
    if(!(FLAGS[i] & F_ALIVE)) continue;
    AI_TIMER[i] -= dt;

    var pid = _playerEid;
    if(pid < 0) continue;

    var dx = PX[pid] - PX[i];
    var dz = PZ[pid] - PZ[i];
    var d2 = dx*dx + dz*dz;

    switch(AI_STATE[i]){
      case AI_IDLE:
        if(d2 < CHASE_RANGE*CHASE_RANGE) AI_STATE[i] = AI_CHASE;
        else if(AI_TIMER[i] <= 0){
          AI_STATE[i] = AI_PATROL;
          AI_TIMER[i] = 2.0 + Math.random() * 3.0;
        }
        break;

      case AI_PATROL:
        VX[i] += (Math.random()-0.5)*0.5;
        VZ[i] += (Math.random()-0.5)*0.5;
        if(d2 < CHASE_RANGE*CHASE_RANGE || AI_TIMER[i] <= 0) AI_STATE[i] = AI_IDLE;
        break;

      case AI_CHASE:
        if(d2 > CHASE_RANGE*CHASE_RANGE*2.25){ AI_STATE[i]=AI_IDLE; break; }
        if(d2 < ATTACK_RANGE*ATTACK_RANGE){ AI_STATE[i]=AI_ATTACK; AI_TIMER[i]=0.5; break; }
        // Steer — sqrt only here (once per enemy per frame)
        var dist = Math.sqrt(d2);
        VX[i] = (dx/dist)*CHASE_SPEED;
        VZ[i] = (dz/dist)*CHASE_SPEED;
        RY[i] = Math.atan2(dx, dz);
        FLAGS[i] |= F_DIRTY;
        break;

      case AI_ATTACK:
        if(AI_TIMER[i] <= 0){
          HP[pid] -= 10;
          AI_TIMER[i] = 0.8;
          if(d2 > ATTACK_RANGE*ATTACK_RANGE) AI_STATE[i] = AI_CHASE;
        }
        break;
    }
  }
}

// ── C4: Input System ─────────────────────────────────────────────
var _keys = new Uint8Array(256);
var _joyX = 0, _joyZ = 0;
var PLAYER_SPEED = 8.0;

function inputSystem(dt) {
  if(_playerEid < 0) return;
  var pid = _playerEid;

  // Keyboard WASD / Arrows
  var kx = ((_keys[68]||_keys[39])?1:0) - ((_keys[65]||_keys[37])?1:0);
  var kz = ((_keys[83]||_keys[40])?1:0) - ((_keys[87]||_keys[38])?1:0);

  var mx = kx + _joyX;
  var mz = kz + _joyZ;

  // Clamp to unit circle
  var mlen = Math.sqrt(mx*mx + mz*mz);
  if(mlen > 1){ mx /= mlen; mz /= mlen; }

  if(mlen > 0.05){
    VX[pid] = mx * PLAYER_SPEED;
    VZ[pid] = mz * PLAYER_SPEED;
    RY[pid] = Math.atan2(mx, mz);
    FLAGS[pid] |= F_DIRTY;
  }

  // Jump — spacebar
  if(_keys[32] && PY[pid] === 0){ VY[pid] = 10; _keys[32] = 0; }
}


// ═══════════════════════════════════════════════════════════════════
// D — RENDERER, SCENE, CAMERA, LIGHTING
// ═══════════════════════════════════════════════════════════════════

var scene, camera, renderer, sun;
var shadowEnabled = true;
var qualityLevel  = 2;
var _playerEid    = -1;
var ecsMode       = false;  // toggle ECS gameplay on/off

// Three.js reusable dummy — zero alloc in render sync
// (created in bootScene after THREE is confirmed loaded)

// ═══════════════════════════════════════════════════════════════════
// E — ASSET SYSTEM
// ═══════════════════════════════════════════════════════════════════

// Texture cache — url → THREE.Texture (NES CHR-ROM: load once, reuse)
var texCache = {};

// Mesh pool — pre-allocated InstancedMesh slots
// meshPool[id] = { mesh: InstancedMesh, maxCount, used: Uint8Array, freeSlots: [] }
var meshPool = [];

// Legacy array for non-ECS viewer mode
var instancedMeshes = [];
var totalInstances  = 0;

function loadBinary(url, onProg) {
  return new Promise(function(res,rej){
    var xhr = new XMLHttpRequest();
    xhr.open('GET',url,true);
    xhr.responseType = 'arraybuffer';
    xhr.onprogress = function(e){ if(onProg && e.lengthComputable) onProg(e.loaded/e.total); };
    xhr.onload = function(){
      (xhr.status===200||xhr.status===0) ? res(xhr.response) : rej(new Error('HTTP '+xhr.status));
    };
    xhr.onerror = function(){ rej(new Error('XHR error: '+url)); };
    xhr.send();
  });
}

function loadTextureCached(url) {
  if(texCache[url]) return Promise.resolve(texCache[url]);
  return new Promise(function(res,rej){
    var xhr = new XMLHttpRequest();
    xhr.open('GET',url,true); xhr.responseType='blob';
    xhr.onload = function(){
      if(xhr.status===200||xhr.status===0){
        var blobUrl = URL.createObjectURL(xhr.response);
        var img = new window._NativeImage();
        img.onload = function(){
          var tex = new THREE.Texture(img);
          tex.needsUpdate = true;
          tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
          tex.minFilter = THREE.LinearMipMapLinearFilter;
          tex.magFilter = THREE.LinearFilter;
          tex.generateMipmaps = true;
          texCache[url] = tex;
          res(tex);
        };
        img.onerror = function(){ rej(new Error('img load failed: '+url)); };
        img.src = blobUrl;
      } else { rej(new Error('XHR '+xhr.status+': '+url)); }
    };
    xhr.onerror = function(){ rej(new Error('XHR error: '+url)); };
    xhr.send();
  });
}

// Register an InstancedMesh as a pool — returns pool ID
function registerMeshPool(iMesh, maxCount) {
  var entry = {
    mesh:      iMesh,
    maxCount:  maxCount,
    used:      new Uint8Array(maxCount),
    freeSlots: []
  };
  for(var i = maxCount-1; i >= 0; i--) entry.freeSlots.push(i);
  meshPool.push(entry);
  return meshPool.length - 1;
}

function allocMeshSlot(poolId) {
  var p = meshPool[poolId];
  if(!p || !p.freeSlots.length) return -1;
  var slot = p.freeSlots.pop();
  p.used[slot] = 1;
  return slot;
}

function freeMeshSlot(poolId, slot) {
  var p = meshPool[poolId];
  if(!p) return;
  p.used[slot] = 0;
  p.freeSlots.push(slot);
  // Hide by scaling to zero — no GPU reallocation needed
  if(!_syncObj) return;
  _syncObj.position.set(0,-9999,0);
  _syncObj.rotation.set(0,0,0);
  _syncObj.scale.set(0,0,0);
  _syncObj.updateMatrix();
  p.mesh.setMatrixAt(slot, _syncObj.matrix);
  p.mesh.instanceMatrix.needsUpdate = true;
  // Restore syncObj scale for next use
  _syncObj.scale.set(1,1,1);
}

// Spawn entity + grab mesh slot
function spawnEntity(type, poolId, x, y, z) {
  var id   = createEntity();
  var slot = allocMeshSlot(poolId);
  if(id < 0 || slot < 0){ if(id >= 0) destroyEntity(id); return -1; }
  TYPE[id]     = type;
  PX[id] = x; PY[id] = y; PZ[id] = z;
  MESH_ID[id]  = poolId;
  MESH_IDX[id] = slot;
  FLAGS[id]   |= F_DIRTY | F_PHYSICS;
  return id;
}

function despawnEntity(id) {
  var mid = MESH_ID[id], idx = MESH_IDX[id];
  if(mid >= 0 && idx >= 0) freeMeshSlot(mid, idx);
  destroyEntity(id);
}

// ── Geometry merger (no BufferGeometryUtils dependency) ──────────
// Flat typed arrays, one concat pass — NES sprite sheet packing
function mergeGeometries(geos) {
  var totalVerts = 0, totalIdx = 0, hasIndex = false;
  for(var g = 0; g < geos.length; g++){
    totalVerts += geos[g].attributes.position.count;
    if(geos[g].index){ totalIdx += geos[g].index.count; hasIndex = true; }
  }
  var positions = new Float32Array(totalVerts*3);
  var normals   = new Float32Array(totalVerts*3);
  var uvs       = new Float32Array(totalVerts*2);
  var indices   = hasIndex ? new Uint32Array(totalIdx) : null;
  var vOff=0, iOff=0, vBase=0;
  for(var g = 0; g < geos.length; g++){
    var geo = geos[g];
    var pos = geo.attributes.position.array;
    var nor = geo.attributes.normal ? geo.attributes.normal.array : null;
    var uv  = geo.attributes.uv     ? geo.attributes.uv.array     : null;
    var vc  = geo.attributes.position.count;
    positions.set(pos, vOff*3);
    if(nor) normals.set(nor, vOff*3);
    if(uv)  uvs.set(uv,  vOff*2);
    if(hasIndex && geo.index){
      var idx = geo.index.array;
      for(var j=0; j<idx.length; j++) indices[iOff+j] = idx[j]+vBase;
      iOff += idx.length;
    }
    vBase += vc; vOff += vc;
  }
  var merged = new THREE.BufferGeometry();
  merged.setAttribute('position', new THREE.BufferAttribute(positions,3));
  merged.setAttribute('normal',   new THREE.BufferAttribute(normals,  3));
  merged.setAttribute('uv',       new THREE.BufferAttribute(uvs,      2));
  if(indices) merged.setIndex(new THREE.BufferAttribute(indices,1));
  return merged;
}


// ── Build InstancedMesh from loaded GLTF scene ───────────────────
// Returns array of pool IDs created (for ECS mode) or null (viewer mode)
function buildInstances(gltfScene, basePath, count, forEcs) {
  var SPREAD = 90;

  // Normalise model into 2-unit cube sitting on Y=0
  var box    = new THREE.Box3().setFromObject(gltfScene);
  var size   = box.getSize(new THREE.Vector3());
  var center = box.getCenter(new THREE.Vector3());
  var modelScale = 2.0 / Math.max(size.x, size.y, size.z, 0.001);
  var normMat = new THREE.Matrix4()
    .makeTranslation(-center.x, -box.min.y, -center.z)
    .premultiply(new THREE.Matrix4().makeScale(modelScale,modelScale,modelScale));

  // Group meshes by material/texture key
  var groups = {};
  gltfScene.updateMatrixWorld(true);
  gltfScene.traverse(function(child){
    if(!child.isMesh || !child.geometry) return;
    var srcMat = Array.isArray(child.material) ? child.material[0] : child.material;
    var texUrl = null;
    var texKey = 'solid_'+(srcMat&&srcMat.color?srcMat.color.getHexString():'cccccc');
    if(srcMat&&srcMat.map&&srcMat.map.image&&srcMat.map.image.src){
      texUrl = srcMat.map.image.src; texKey = 'tex_'+texUrl;
    } else if(srcMat&&srcMat.map){
      texKey = 'tex_'+basePath;
    }
    var geo = child.geometry.clone();
    var wm  = child.matrixWorld.clone();
    wm.premultiply(normMat);
    geo.applyMatrix4(wm);
    if(!groups[texKey]) groups[texKey]={geos:[],srcMat:srcMat,texUrl:texUrl,basePath:basePath};
    groups[texKey].geos.push(geo);
  });

  var keys = Object.keys(groups);
  if(!keys.length){ setStatus('No meshes found!'); return null; }

  // Pre-compute instance matrices once (shared OAM table)
  var cols    = Math.ceil(Math.sqrt(count));
  var spacing = (SPREAD*2)/cols;
  var matrices = new Array(count);
  var tmpDummy = new THREE.Object3D();
  for(var i=0; i<count; i++){
    var col=i%cols, row=Math.floor(i/cols);
    tmpDummy.position.set(
      -SPREAD+col*spacing+(Math.random()-0.5)*spacing*0.55,
      0,
      -SPREAD+row*spacing+(Math.random()-0.5)*spacing*0.55
    );
    tmpDummy.rotation.set(0, Math.random()*Math.PI*2, 0);
    var s=0.75+Math.random()*0.5;
    tmpDummy.scale.set(s,s,s);
    tmpDummy.updateMatrix();
    matrices[i] = tmpDummy.matrix.clone();
  }

  var createdPools = [];

  keys.forEach(function(key){
    var grp = groups[key];
    var mergedGeo = grp.geos.length===1 ? grp.geos[0] : mergeGeometries(grp.geos);
    var srcMat = grp.srcMat;
    var instMat = new THREE.MeshStandardMaterial({
      color:     srcMat&&srcMat.color ? srcMat.color.clone() : new THREE.Color(0xcccccc),
      roughness: srcMat&&srcMat.roughness!=null ? srcMat.roughness : 0.8,
      metalness: srcMat&&srcMat.metalness!=null ? srcMat.metalness : 0.05,
      side:      THREE.FrontSide
    });

    var iMesh = new THREE.InstancedMesh(mergedGeo, instMat, count);
    iMesh.castShadow    = true;
    iMesh.receiveShadow = true;
    // ECS: DynamicDrawUsage — matrices update every frame via renderSyncSystem
    // Viewer: StaticDrawUsage — matrices written once, never changed
    iMesh.instanceMatrix.setUsage(forEcs ? THREE.DynamicDrawUsage : THREE.StaticDrawUsage);
    for(var i=0; i<count; i++) iMesh.setMatrixAt(i, matrices[i]);
    iMesh.instanceMatrix.needsUpdate = true;
    scene.add(iMesh);

    if(forEcs){
      // Register as pool — all slots start FREE, initEcsEntities allocates them
      var pid = registerMeshPool(iMesh, count);
      createdPools.push(pid);
    } else {
      instancedMeshes.push(iMesh);
    }

    // Async texture upgrade
    if(srcMat&&srcMat.map&&srcMat.map.image){
      instMat.map = srcMat.map; instMat.needsUpdate = true;
    } else if(srcMat&&srcMat.map&&srcMat.map.name){
      var guessUrl = grp.basePath+'Textures/'+srcMat.map.name+'.png';
      loadTextureCached(guessUrl).then(function(tex){
        instMat.map = tex; instMat.needsUpdate = true;
      }).catch(function(e){ console.warn('Tex load failed:',e.message); });
    }
  });

  totalInstances = count;
  document.getElementById('hInst').textContent = count.toLocaleString();
  return createdPools;
}

// ── Clear all viewer-mode instances ─────────────────────────────
function clearInstances() {
  instancedMeshes.forEach(function(m){
    scene.remove(m);
    m.geometry.dispose();
    if(Array.isArray(m.material)) m.material.forEach(function(mt){ mt.dispose(); });
    else m.material.dispose();
  });
  instancedMeshes = [];
  // Also clear ECS pools
  meshPool.forEach(function(p){ scene.remove(p.mesh); });
  meshPool = [];
  // Destroy all entities
  for(var i=0; i<_eid; i++) FLAGS[i]=0;
  _eid=0; _free=[]; _playerEid=-1;
  totalInstances = 0;
  document.getElementById('hInst').textContent = '0';
  document.getElementById('hEnt').textContent  = '0';
}

// ── Load GLB → build instances ───────────────────────────────────
function loadAndSpawn(url, count) {
  clearInstances();
  setStatus('Loading...');
  loadBinary(url, function(p){ setStatus('Downloading... '+Math.round(p*100)+'%'); })
  .then(function(buffer){
    setStatus('Parsing GLB...');
    var basePath = url.substring(0, url.lastIndexOf('/')+1);
    var loader = new THREE.GLTFLoader();
    loader.parse(buffer, basePath, function(gltf){
      setStatus('Building instances...');
      setTimeout(function(){
        if(ecsMode){
          var pools = buildInstances(gltf.scene, basePath, count, true);
          if(pools && pools.length){
            initEcsEntities(pools[0], count);
          }
        } else {
          buildInstances(gltf.scene, basePath, count, false);
        }
        setStatus('');
      }, 50);
    }, function(err){ setStatus('Parse error: '+(err.message||err)); });
  }).catch(function(err){ setStatus('Load error: '+err.message); });
}


// ── ECS entity init — spawn entities into the pool ───────────────
function initEcsEntities(poolId, count) {
  var SPREAD = 85;
  var cols   = Math.ceil(Math.sqrt(count));
  var spacing = (SPREAD*2)/cols;

  for(var i=0; i<count; i++){
    var col=i%cols, row=Math.floor(i/cols);
    var x = -SPREAD+col*spacing+(Math.random()-0.5)*spacing*0.55;
    var z = -SPREAD+row*spacing+(Math.random()-0.5)*spacing*0.55;

    var id = spawnEntity(T_ENEMY, poolId, x, 0, z);
    if(id < 0) break;

    // First entity becomes the player
    if(i === 0){
      TYPE[id]    = T_PLAYER;
      FLAGS[id]  |= F_PLAYER;
      FLAGS[id]  &= ~F_AI;
      FLAGS[id]  |= F_PHYSICS;
      _playerEid  = id;
      HP[id] = HP_MAX[id] = 200;
    } else {
      TYPE[id]   = T_ENEMY;
      FLAGS[id] |= F_AI | F_ENEMY | F_PHYSICS;
      HP[id] = HP_MAX[id] = 50;
      AI_STATE[id] = AI_IDLE;
      AI_TIMER[id] = Math.random()*3.0;
    }
  }

  document.getElementById('hEnt').textContent = _eid;
}

var statusEl = document.getElementById('status');
function setStatus(msg){
  statusEl.style.display = msg ? 'block' : 'none';
  statusEl.textContent   = msg;
}

window.onerror = function(m,s,l,c){ setStatus('JS ERROR: '+m+' ('+l+':'+c+')'); };

if(typeof THREE === 'undefined'){
  setStatus('ERROR: three.min.js not found');
} else if(typeof THREE.GLTFLoader === 'undefined'){
  setStatus('ERROR: GLTFLoader.js not found');
} else {
  bootScene();
}

function bootScene() {
  setStatus('');

  // ── Renderer ────────────────────────────────────────────────────
  renderer = new THREE.WebGLRenderer({
    antialias:       false,
    powerPreference: 'high-performance',
    stencil:         false,
    depth:           true
  });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
  renderer.outputColorSpace   = THREE.SRGBColorSpace || THREE.LinearEncoding;
  renderer.toneMapping        = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  document.body.appendChild(renderer.domElement);

  // Reusable dummies — zero alloc in hot loop
  _syncObj   = new THREE.Object3D();
  _camTarget  = new THREE.Vector3();
  _camDesired = new THREE.Vector3();

  // ── Scene ───────────────────────────────────────────────────────
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB);
  scene.fog = new THREE.FogExp2(0x87CEEB, 0.008);

  // ── Camera ──────────────────────────────────────────────────────
  camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.5, 600);
  camera.position.set(0, 18, 40);
  camera.lookAt(0, 0, 0);

  // ── Lighting ────────────────────────────────────────────────────
  var hemi = new THREE.HemisphereLight(0xb0d8ff, 0x4a7c3f, 0.6);
  scene.add(hemi);

  sun = new THREE.DirectionalLight(0xfff5e0, 1.2);
  sun.position.set(40, 80, 30);
  sun.castShadow = true;
  var sc = sun.shadow.camera;
  sc.left = sc.bottom = -120;
  sc.right = sc.top   =  120;
  sc.near  = 1; sc.far = 300;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.bias       = -0.0005;
  sun.shadow.normalBias =  0.02;
  scene.add(sun);
  scene.add(sun.target);

  var fill = new THREE.DirectionalLight(0xaaccff, 0.3);
  fill.position.set(-30, 20, -20);
  scene.add(fill);

  // ── Ground ──────────────────────────────────────────────────────
  var ground = new THREE.Mesh(
    new THREE.PlaneGeometry(400, 400),
    new THREE.MeshStandardMaterial({ color:0x5a8a3c, roughness:0.9, metalness:0.0 })
  );
  ground.rotation.x = -Math.PI/2;
  ground.receiveShadow = true;
  scene.add(ground);

  var grid = new THREE.GridHelper(400, 80, 0x000000, 0x000000);
  grid.material.opacity = 0.12;
  grid.material.transparent = true;
  scene.add(grid);

  // ── Input setup ─────────────────────────────────────────────────
  setupKeyboard();
  setupJoystick();
  setupOrbitControls();

  // ── UI wiring ───────────────────────────────────────────────────
  document.getElementById('btnLoad').onclick  = function(){
    loadAndSpawn(document.getElementById('modelSelect').value, 2000);
  };
  document.getElementById('btnSpawn').onclick = function(){
    loadAndSpawn(document.getElementById('modelSelect').value, 2000);
  };
  document.getElementById('btnClear').onclick  = clearInstances;
  document.getElementById('btnShadow').onclick = toggleShadow;
  document.getElementById('btnEcs').onclick    = toggleEcs;

  // ── Resize ──────────────────────────────────────────────────────
  window.addEventListener('resize', function(){
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ── Start loop + auto-load ───────────────────────────────────────
  _lastTime = performance.now();
  requestAnimationFrame(gameLoop);
  loadAndSpawn(document.getElementById('modelSelect').value, 2000);
}

function toggleShadow() {
  shadowEnabled = !shadowEnabled;
  renderer.shadowMap.enabled = shadowEnabled;
  renderer.shadowMap.needsUpdate = true;
  instancedMeshes.forEach(function(m){ m.castShadow=shadowEnabled; m.receiveShadow=shadowEnabled; });
  meshPool.forEach(function(p){ p.mesh.castShadow=shadowEnabled; p.mesh.receiveShadow=shadowEnabled; });
  document.getElementById('btnShadow').textContent = 'SHADOW: '+(shadowEnabled?'ON':'OFF');
}

function toggleEcs() {
  ecsMode = !ecsMode;
  document.getElementById('btnEcs').textContent = 'ECS: '+(ecsMode?'ON':'OFF');
  document.getElementById('ecspanel').style.display = ecsMode ? 'block' : 'none';
  // Reload with new mode
  loadAndSpawn(document.getElementById('modelSelect').value, 2000);
}


// ═══════════════════════════════════════════════════════════════════
// G — GAME LOOP  (fixed physics timestep + variable render)
//   Physics: always 60Hz (NES NTSC fixed rate)
//   Render:  variable, catches up or skips
// ═══════════════════════════════════════════════════════════════════

var _accumulator = 0;
var _lastTime    = 0;
var _physSteps   = 0;  // steps taken last frame (for HUD)

// FPS rolling average — Float32Array ring buffer, 60 slots
// No Date.now(), no string ops in hot path
var _fpsRing = new Float32Array(60);
var _fpsHead = 0;
var _fpsSum  = 0;
var currentFps = 60;
var currentMs  = 16;

// HUD throttle counters (bit-mask trick: update every N frames)
var _hudTick  = 0;

// Adaptive quality
var _qualTick = 0;
var QUAL_INTERVAL = 120; // frames between quality checks

// Pre-allocated vectors for follow camera — zero alloc in hot loop
var _camTarget = null;  // set after THREE loads
var _camDesired = null;

function gameLoop(now) {
  requestAnimationFrame(gameLoop);

  var dt = (now - _lastTime) * 0.001;
  if(dt > 0.1) dt = 0.1;  // cap — prevents spiral of death on tab-switch
  _lastTime = now;

  // ── FPS rolling average ────────────────────────────────────────
  _fpsSum -= _fpsRing[_fpsHead];
  _fpsRing[_fpsHead] = dt;
  _fpsSum += dt;
  _fpsHead = (_fpsHead + 1) % 60;
  currentFps = Math.round(60 / (_fpsSum || 1));
  currentMs  = dt * 1000;

  // ── Fixed timestep physics (only in ECS mode) ──────────────────
  _physSteps = 0;
  if(ecsMode){
    _accumulator += dt;
    while(_accumulator >= FIXED_DT && _physSteps < MAX_STEPS){
      inputSystem(FIXED_DT);
      physicsSystem(FIXED_DT);
      aiSystem(FIXED_DT);
      _accumulator -= FIXED_DT;
      _physSteps++;
    }
    // Sync dirty transforms to GPU
    renderSyncSystem();

    // Follow camera — track player if ECS mode
    if(_playerEid >= 0 && _camTarget){
      _camTarget.set(PX[_playerEid], PY[_playerEid]+2, PZ[_playerEid]);
      _camDesired.set(PX[_playerEid], PY[_playerEid]+12, PZ[_playerEid]+20);
      camera.position.lerp(_camDesired, 0.08);
      camera.lookAt(_camTarget);
    }
  }

  // ── Render ────────────────────────────────────────────────────
  renderer.render(scene, camera);

  // ── HUD update every 16 frames (~4x/sec at 60fps) ─────────────
  _hudTick = (_hudTick + 1) & 15;
  if(_hudTick === 0) updateHUD();

  // ── Adaptive quality every 120 frames (~2x/sec) ───────────────
  _qualTick = (_qualTick + 1);
  if(_qualTick >= QUAL_INTERVAL){ _qualTick = 0; adaptiveQuality(); }
}

function updateHUD() {
  var info = renderer.info;

  var fpsEl = document.getElementById('hFps');
  fpsEl.textContent = currentFps;
  fpsEl.className   = currentFps>=30?'val good':currentFps>=20?'val warn':'val bad';

  document.getElementById('hMs').textContent   = currentMs.toFixed(1)+' ms';
  document.getElementById('hDraw').textContent = info.render.calls;
  document.getElementById('hTris').textContent = (info.render.triangles/1000).toFixed(1)+'k';
  document.getElementById('hInst').textContent = totalInstances.toLocaleString();
  document.getElementById('hStep').textContent = ecsMode ? _physSteps : '--';

  // Count alive entities
  var alive=0;
  for(var i=0;i<_eid;i++) if(FLAGS[i]&F_ALIVE) alive++;
  document.getElementById('hEnt').textContent = alive;

  if(performance.memory){
    var mb = (performance.memory.usedJSHeapSize/1048576).toFixed(0);
    document.getElementById('hMem').textContent = mb+' MB';
  } else {
    document.getElementById('hMem').textContent = 'n/a';
  }

  // ECS debug panel
  if(ecsMode){
    var enemies=0, statics=0, dirty=0;
    for(var i=0;i<_eid;i++){
      var f=FLAGS[i];
      if(!(f&F_ALIVE)) continue;
      if(f&F_ENEMY)  enemies++;
      if(f&F_STATIC) statics++;
      if(f&F_DIRTY)  dirty++;
    }
    document.getElementById('eAlive').textContent  = alive;
    document.getElementById('ePlayer').textContent = _playerEid >= 0
      ? 'id='+_playerEid+' hp='+HP[_playerEid] : '--';
    document.getElementById('eEnemy').textContent  = enemies;
    document.getElementById('eStatic').textContent = statics;
    document.getElementById('eDirty').textContent  = dirty;
    document.getElementById('eSteps').textContent  = _physSteps;
  }
}

function adaptiveQuality() {
  var qEl = document.getElementById('hQual');
  if(currentFps < 25 && qualityLevel > 0){
    qualityLevel--;
    applyQuality();
    qEl.textContent = ['LOW','MED','HIGH'][qualityLevel];
    qEl.className   = 'val warn';
  } else if(currentFps > 55 && qualityLevel < 2){
    qualityLevel++;
    applyQuality();
    qEl.textContent = ['LOW','MED','HIGH'][qualityLevel];
    qEl.className   = 'val good';
  } else {
    qEl.textContent = ['LOW','MED','HIGH'][qualityLevel];
    qEl.className   = currentFps>=30?'val good':'val warn';
  }
  document.getElementById('qualBadge').textContent = 'Q: '+['LOW','MED','HIGH'][qualityLevel];
}

function applyQuality() {
  var cfg = QUALITY_CONFIGS[qualityLevel];
  renderer.setPixelRatio(cfg.pr);
  if(sun&&sun.shadow){
    sun.shadow.mapSize.set(cfg.shadowMap, cfg.shadowMap);
    sun.shadow.map = null;
    renderer.shadowMap.needsUpdate = true;
  }
  if(scene.fog) scene.fog.density = cfg.fog;
}


// ═══════════════════════════════════════════════════════════════════
// H — INPUT: KEYBOARD + VIRTUAL JOYSTICK + ORBIT CONTROLS
// ═══════════════════════════════════════════════════════════════════

function setupKeyboard() {
  document.addEventListener('keydown', function(e){ _keys[e.keyCode & 0xFF] = 1; });
  document.addEventListener('keyup',   function(e){ _keys[e.keyCode & 0xFF] = 0; });
}

// Virtual joystick — left half of screen, touch only
function setupJoystick() {
  var joyBase  = document.getElementById('joy-base');
  var joyKnob  = document.getElementById('joy-knob');
  var JOY_R    = 50;  // radius in px
  var joyActive = false;
  var joyBaseX = 0, joyBaseY = 0;
  var joyTouchId = -1;

  document.addEventListener('touchstart', function(e){
    for(var t=0; t<e.changedTouches.length; t++){
      var touch = e.changedTouches[t];
      if(touch.clientX < window.innerWidth*0.5 && joyTouchId < 0){
        joyActive  = true;
        joyTouchId = touch.identifier;
        joyBaseX   = touch.clientX;
        joyBaseY   = touch.clientY;
        // Move base to touch point
        joyBase.style.left = (joyBaseX - 50)+'px';
        joyBase.style.bottom = 'auto';
        joyBase.style.top  = (joyBaseY - 50)+'px';
        _joyX = _joyZ = 0;
      }
    }
  }, {passive:true});

  document.addEventListener('touchmove', function(e){
    if(!joyActive) return;
    for(var t=0; t<e.changedTouches.length; t++){
      var touch = e.changedTouches[t];
      if(touch.identifier !== joyTouchId) continue;
      var dx = touch.clientX - joyBaseX;
      var dy = touch.clientY - joyBaseY;
      var len = Math.sqrt(dx*dx+dy*dy);
      if(len > JOY_R){ dx=dx/len*JOY_R; dy=dy/len*JOY_R; }
      _joyX = dx/JOY_R;
      _joyZ = dy/JOY_R;
      joyKnob.style.transform = 'translate(calc(-50% + '+dx+'px), calc(-50% + '+dy+'px))';
    }
  }, {passive:true});

  function joyEnd(e){
    for(var t=0; t<e.changedTouches.length; t++){
      if(e.changedTouches[t].identifier === joyTouchId){
        joyActive = false; joyTouchId = -1;
        _joyX = _joyZ = 0;
        joyKnob.style.transform = 'translate(-50%,-50%)';
        // Reset base position
        joyBase.style.left='50px'; joyBase.style.top='auto'; joyBase.style.bottom='50px';
      }
    }
  }
  document.addEventListener('touchend',    joyEnd, {passive:true});
  document.addEventListener('touchcancel', joyEnd, {passive:true});
}

// Orbit controls — right half touch + mouse (viewer mode)
// In ECS mode the camera follows the player instead
function setupOrbitControls() {
  var sph    = { theta:0.5, phi:0.9, r:45 };
  var target = new THREE.Vector3(0,0,0);
  var drag=false, px=0, py=0, pinchD=0;
  var orbitTouchId = -1;

  function applyCamera(){
    if(ecsMode) return; // ECS mode uses follow camera
    camera.position.set(
      target.x + sph.r*Math.sin(sph.phi)*Math.sin(sph.theta),
      target.y + sph.r*Math.cos(sph.phi),
      target.z + sph.r*Math.sin(sph.phi)*Math.cos(sph.theta)
    );
    camera.lookAt(target);
  }
  applyCamera();

  var el = renderer.domElement;

  el.addEventListener('touchstart', function(e){
    for(var t=0; t<e.touches.length; t++){
      if(e.touches[t].clientX >= window.innerWidth*0.5 && orbitTouchId < 0){
        drag=true; orbitTouchId=e.touches[t].identifier;
        px=e.touches[t].clientX; py=e.touches[t].clientY;
      }
    }
    if(e.touches.length===2){
      drag=false;
      pinchD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                        e.touches[0].clientY-e.touches[1].clientY);
    }
  },{passive:true});

  el.addEventListener('touchmove', function(e){
    if(drag && e.touches.length===1){
      for(var t=0; t<e.touches.length; t++){
        if(e.touches[t].identifier===orbitTouchId){
          sph.theta -= (e.touches[t].clientX-px)*0.004;
          sph.phi    = Math.max(0.05,Math.min(Math.PI-0.05,sph.phi+(e.touches[t].clientY-py)*0.004));
          px=e.touches[t].clientX; py=e.touches[t].clientY;
          applyCamera();
        }
      }
    }
    if(e.touches.length===2){
      var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                       e.touches[0].clientY-e.touches[1].clientY);
      sph.r=Math.max(5,Math.min(200,sph.r*(pinchD/d)));
      pinchD=d; applyCamera();
    }
  },{passive:true});

  el.addEventListener('touchend', function(e){
    for(var t=0; t<e.changedTouches.length; t++){
      if(e.changedTouches[t].identifier===orbitTouchId){ drag=false; orbitTouchId=-1; }
    }
  },{passive:true});

  el.addEventListener('mousedown', function(e){ drag=true; px=e.clientX; py=e.clientY; });
  el.addEventListener('mousemove', function(e){
    if(!drag) return;
    sph.theta -= (e.clientX-px)*0.004;
    sph.phi    = Math.max(0.05,Math.min(Math.PI-0.05,sph.phi+(e.clientY-py)*0.004));
    px=e.clientX; py=e.clientY; applyCamera();
  });
  el.addEventListener('mouseup',  function(){ drag=false; });
  el.addEventListener('wheel',    function(e){
    sph.r=Math.max(5,Math.min(200,sph.r+e.deltaY*0.05)); applyCamera();
  });
}

</script>
</body>
</html>
